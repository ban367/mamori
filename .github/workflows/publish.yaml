# mainブランチへのマージをトリガーにVS Code Marketplaceへ公開する
name: Publish Extension

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish to marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: get local version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: check if version already published
        id: check
        run: |
          EXTENSION_ID=$(node -p "const p=require('./package.json'); p.publisher + '.' + p.name")
          LOCAL_VERSION="${{ steps.version.outputs.version }}"

          # Marketplace APIから公開済みバージョン一覧を取得（stdoutのみをJSONパース対象とし、stderrはログ用に分離する）
          API_STDOUT=$(mktemp)
          API_STDERR=$(mktemp)
          if npx @vscode/vsce show "$EXTENSION_ID" --json >"$API_STDOUT" 2>"$API_STDERR"; then
            API_SUCCESS=true
          else
            API_SUCCESS=false
          fi

          if [ "$API_SUCCESS" = "false" ] || [ ! -s "$API_STDOUT" ]; then
            echo "::notice::Marketplace APIから有効なレスポンスを取得できませんでした（未公開の拡張機能の可能性があります）。公開を試みます。"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            VERSION_EXISTS=$(cat "$API_STDOUT" | node -p "
              const input = require('fs').readFileSync(0, 'utf8');
              const parsed = JSON.parse(input);
              const versions = (parsed && parsed.versions) || [];
              versions.some(v => v.version === '$LOCAL_VERSION');
            ")
            if [ "$VERSION_EXISTS" = "true" ]; then
              echo "バージョン $LOCAL_VERSION は公開済みです。スキップします。"
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
            else
              echo "バージョン $LOCAL_VERSION を公開します。"
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: lint
        if: steps.check.outputs.should_publish == 'true'
        run: npm run lint

      - name: test
        if: steps.check.outputs.should_publish == 'true'
        run: npm test

      - name: package extension
        if: steps.check.outputs.should_publish == 'true'
        run: npx @vscode/vsce package --out extension.vsix

      - name: publish to VS Code Marketplace
        if: steps.check.outputs.should_publish == 'true'
        run: |
          npx @vscode/vsce publish --packagePath extension.vsix 2>&1 | tee /tmp/vsce-publish.log
          # vsceがexit 0でも実際には公開失敗しているケースがあるため、成功メッセージの存在を検証する
          if ! grep -q "Published" /tmp/vsce-publish.log; then
            echo "::error::Marketplace公開の成功を確認できませんでした。出力内容:"
            cat /tmp/vsce-publish.log
            exit 1
          fi
        env:
          VSCE_PAT: ${{ secrets.MARKETPLACE_ACCESS_TOKEN }}
