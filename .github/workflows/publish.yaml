# タグ作成をトリガーにVS Code Marketplaceへ公開する
name: Publish Extension

on:
  workflow_call:
    inputs:
      tag:
        description: "公開するバージョンタグ (例: v1.0.0)"
        required: true
        type: string
    secrets:
      MARKETPLACE_ACCESS_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: publish to marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: validate tag format
        run: |
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::無効なタグ形式: $TAG (期待: vX.X.X)"
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: sync package.json version with tag
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: install dependencies
        run: npm ci

      - name: lint
        run: npm run lint

      - name: test
        run: npm test

      - name: package extension
        run: npx @vscode/vsce package --no-update-package-json

      - name: publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath "mamori-${VERSION}.vsix"
        env:
          MARKETPLACE_ACCESS_TOKEN: ${{ secrets.MARKETPLACE_ACCESS_TOKEN }}

      - name: create GitHub Release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const tag = '${{ inputs.tag }}';
            const version = tag.replace(/^v/, '');

            // CHANGELOG.mdから該当バージョンのセクションを抽出
            let body = '';
            try {
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const regex = new RegExp(
                `## \\[${version.replace(/\./g, '\\.')}\\][\\s\\S]*?(?=## \\[|$)`
              );
              const match = changelog.match(regex);
              if (match) {
                body = match[0].trim();
              }
            } catch (e) {
              console.log('CHANGELOG.mdの読み取りに失敗。リリースノートは空になります。');
            }

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: body || `${tag} リリース`,
              draft: false,
              prerelease: false
            });

            // .vsixファイルをリリースアセットとして添付
            const vsixPath = `mamori-${version}.vsix`;
            const vsixData = fs.readFileSync(vsixPath);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: vsixPath,
              data: vsixData
            });
