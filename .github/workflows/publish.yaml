# mainブランチへのマージをトリガーにVS Code Marketplaceへ公開する
name: Publish Extension

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish to marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: get local version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: check if version already published
        id: check
        run: |
          EXTENSION_ID=$(node -p "const p=require('./package.json'); p.publisher + '.' + p.name")
          PUBLISHED_VERSION=$(npx @vscode/vsce show "$EXTENSION_ID" --json 2>/dev/null | node -p 'JSON.parse(require("fs").readFileSync(0,"utf8")).versions[0].version' 2>/dev/null || echo "")
          LOCAL_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PUBLISHED_VERSION" = "$LOCAL_VERSION" ]; then
            echo "バージョン $LOCAL_VERSION は公開済みです。スキップします。"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "バージョン $LOCAL_VERSION を公開します。(公開済み: ${PUBLISHED_VERSION:-なし})"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: lint
        if: steps.check.outputs.should_publish == 'true'
        run: npm run lint

      - name: test
        if: steps.check.outputs.should_publish == 'true'
        run: npm test

      - name: package extension
        if: steps.check.outputs.should_publish == 'true'
        run: npx @vscode/vsce package

      - name: publish to VS Code Marketplace
        if: steps.check.outputs.should_publish == 'true'
        run: npx @vscode/vsce publish --packagePath "mamori-${{ steps.version.outputs.version }}.vsix"
        env:
          VSCE_PAT: ${{ secrets.MARKETPLACE_ACCESS_TOKEN }}
