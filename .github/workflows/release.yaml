# vX.X.X形式のタグpushでGitHub Releaseを作成する
name: Create Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: create github release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: sync package.json version with tag
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: install dependencies
        run: npm ci

      - name: package extension
        id: package
        run: |
          npx @vscode/vsce package --out extension.vsix

      - name: create GitHub Release
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.TAG_NAME;
            const version = process.env.VERSION;

            // CHANGELOG.mdから該当バージョンのセクションを抽出
            let body = '';
            try {
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const regex = new RegExp(
                `## \\[${version.replace(/\./g, '\\.')}\\][\\s\\S]*?(?=## \\[|$)`
              );
              const match = changelog.match(regex);
              if (match) {
                body = match[0].trim();
              }
            } catch (e) {
              console.log('CHANGELOG.mdの読み取りに失敗。リリースノートは空になります。');
            }

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: body || `${tag} リリース`,
              draft: false,
              prerelease: false
            });

            // .vsixファイルをリリースアセットとして添付
            const vsixPath = 'extension.vsix';
            const vsixData = fs.readFileSync(vsixPath);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: `mamori-${version}.vsix`,
              data: vsixData,
              headers: {
                'content-type': 'application/octet-stream',
                'content-length': vsixData.length,
              },
            });
