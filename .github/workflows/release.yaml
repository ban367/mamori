# vX.X.X形式のタグpushでGitHub Releaseを作成する
name: Create Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: create github release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: sync package.json version with tag
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: install dependencies
        run: npm ci

      - name: package extension
        run: npx @vscode/vsce package

      - name: create GitHub Release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.TAG_NAME;
            const version = process.env.VERSION;

            // CHANGELOG.mdから該当バージョンのセクションを抽出
            let body = '';
            try {
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const regex = new RegExp(
                `## \\[${version.replace(/\./g, '\\.')}\\][\\s\\S]*?(?=## \\[|$)`
              );
              const match = changelog.match(regex);
              if (match) {
                body = match[0].trim();
              }
            } catch (e) {
              console.log('CHANGELOG.mdの読み取りに失敗。リリースノートは空になります。');
            }

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: body || `${tag} リリース`,
              draft: false,
              prerelease: false
            });

            // .vsixファイルをリリースアセットとして添付
            const vsixPath = `mamori-${version}.vsix`;
            const vsixData = fs.readFileSync(vsixPath);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: vsixPath,
              data: vsixData
            });
